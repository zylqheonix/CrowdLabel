{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CrowdLabel{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>
    <main class="card">
        {% if user.is_authenticated %}
            <div class="topbar">
                <span class="topbar-user">{{ user.username }} ({{ user.role }})</span>
                <a class="topbar-link" href="{% url 'logout' %}">Log out</a>
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
