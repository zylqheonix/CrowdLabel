{% extends "core/base.html" %}
{% load i18n %}

{% block title %}{% trans "Choose new password" %} · {% trans "CrowdLabel" %}{% endblock %}

{% block content %}
    <h1>{% trans "Choose a new password" %}</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="{% url 'reset_password' %}">
        {% csrf_token %}
        <label for="password">{% trans "New password" %}</label>
        <input type="password" id="password" name="password" required autofocus>

        <label for="password_confirm">{% trans "Confirm password" %}</label>
        <input type="password" id="password_confirm" name="password_confirm" required>

        <button class="btn" type="submit">{% trans "Update password" %}</button>
    </form>

    <p class="alt-link"><a href="{% url 'login' %}">{% trans "Back to login" %}</a></p>
{% endblock %}
